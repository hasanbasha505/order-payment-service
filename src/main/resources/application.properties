# Server Configuration
server.port=8080
server.shutdown=graceful

# Application
spring.application.name=order-payment-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payments}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.compression.type=snappy
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000

# Kafka Consumer
spring.kafka.consumer.group-id=payment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.paymentservice.events

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Logging
logging.level.root=INFO
logging.level.com.paymentservice=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.hibernate.SQL=INFO

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Payment Provider
payment.provider.connect-timeout=2000
payment.provider.read-timeout=10000
payment.provider.total-timeout=15000

# Idempotency
payment.idempotency.key-ttl-hours=24
payment.idempotency.max-body-size-bytes=1048576

# Outbox
payment.outbox.polling-interval-ms=100
payment.outbox.batch-size=100

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.paymentProvider.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentProvider.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentProvider.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentProvider.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.paymentProvider.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.paymentProvider.register-health-indicator=true

# Resilience4j Retry
resilience4j.retry.instances.paymentProvider.max-attempts=3
resilience4j.retry.instances.paymentProvider.wait-duration=100ms
resilience4j.retry.instances.paymentProvider.exponential-backoff-multiplier=2
resilience4j.retry.instances.paymentProvider.retry-exceptions[0]=java.net.SocketTimeoutException
resilience4j.retry.instances.paymentProvider.retry-exceptions[1]=java.net.ConnectException
resilience4j.retry.instances.paymentProvider.retry-exceptions[2]=java.io.IOException

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.paymentApi.limit-for-period=100
resilience4j.ratelimiter.instances.paymentApi.limit-refresh-period=1s
resilience4j.ratelimiter.instances.paymentApi.timeout-duration=0s
resilience4j.ratelimiter.instances.paymentApi.register-health-indicator=true

# Transaction Timeout
spring.transaction.default-timeout=30

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.max-age=3600

# ===========================================
# Security Configuration
# ===========================================
# Security is DISABLED by default for development/demo
# Set to 'true' in production to enable OAuth2 authentication
security.enabled=${SECURITY_ENABLED:false}

# OAuth2 Resource Server Configuration (used when security.enabled=true)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OAUTH2_ISSUER_URI:https://auth.example.com}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_URI:https://auth.example.com/.well-known/jwks.json}

# OAuth2 URLs for Swagger documentation
security.oauth2.token-url=${OAUTH2_TOKEN_URL:https://auth.example.com/oauth/token}
security.oauth2.authorization-url=${OAUTH2_AUTHORIZATION_URL:https://auth.example.com/oauth/authorize}
