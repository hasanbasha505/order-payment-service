# Server Configuration
server.port=0

# Application
spring.application.name=order-payment-service-test

# Database - Testcontainers
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///test_payments
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka
spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator
management.endpoints.web.exposure.include=health

# Logging
logging.level.root=WARN
logging.level.com.paymentservice=DEBUG
logging.level.org.springframework.transaction=WARN
logging.level.org.hibernate.SQL=WARN

# Payment Provider
payment.provider.connect-timeout=1000
payment.provider.read-timeout=5000
payment.provider.total-timeout=6000

# Idempotency
payment.idempotency.key-ttl-hours=1

# Outbox
payment.outbox.polling-interval-ms=1000
payment.outbox.batch-size=10
